<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Login</title>
    <style>
        :root {
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --bg: #050a18;
            --glass: rgba(15, 23, 42, 0.85);
            --pop-shadow: 0 10px 40px rgba(0, 210, 255, 0.3);
        }

        body {
            background-color: var(--bg);
            color: #f1f5f9;
            font-family: 'Inter', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .login-card {
            background: var(--glass);
            padding: 60px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.6);
            width: 90%;
            max-width: 450px;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .login-card:hover {
            transform: scale(1.02);
            box-shadow: var(--pop-shadow);
            border-color: var(--primary);
        }

        h2 {
            font-size: 2.2rem;
            margin-bottom: 40px;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 5px;
            text-shadow: 0 0 10px var(--primary);
        }

        .input-group {
            margin-bottom: 25px;
            position: relative;
        }

        input {
            width: 100%;
            padding: 20px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            color: white;
            font-size: 1.1rem;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.2);
        }

        .btn-login {
            width: 100%;
            padding: 22px;
            margin-top: 30px;
            border-radius: 20px;
            border: none;
            background: linear-gradient(135deg, var(--secondary), var(--primary));
            color: white;
            font-size: 1.3rem;
            font-weight: 900;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 3px;
            box-shadow: 0 10px 30px rgba(0, 210, 255, 0.4);
            transition: all 0.3s ease;
        }

        .btn-login:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 15px 40px rgba(0, 210, 255, 0.6);
        }

        .error-msg {
            background: rgba(255, 77, 77, 0.1);
            color: #ff4d4d;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 25px;
            font-weight: bold;
            border: 1px solid #ff4d4d;
        }
        /* Pop-up design */
.modal-overlay {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.9);
    display: flex; justify-content: center; align-items: center;
    z-index: 9999;
    backdrop-filter: blur(10px);
}
.modal-content {
    background: var(--glass);
    padding: 40px;
    border-radius: 30px;
    border: 1px solid var(--primary);
    text-align: center;
    max-width: 400px;
}
    </style>
</head>
<body>
<div id="regModal" class="modal-overlay">
    <div class="modal-content">
        <h2>NEW USER?</h2>
        <p style="color: var(--primary); margin-bottom: 20px;">Create temporary credentials</p>
        <input type="text" id="newU" placeholder="Username">
        <input type="password" id="newP" placeholder="Password">
        <button class="btn-login" onclick="saveUser()">Register</button>
    </div>
</div>
<div class="login-card">
    <h2>PORTAL LOGIN</h2>

    <div class="input-group">
        <input type="text" id="user" placeholder="USERNAME" required>
    </div>

    <div class="input-group">
        <input type="password" id="pass" placeholder="PASSWORD" required>
    </div>

    <button class="btn-login" onclick="checkLogin()">Start Examination</button>
</div>
<script>
    window.onload = function() {
    if (!sessionStorage.getItem('u')) {
        document.getElementById('regModal').style.display = 'flex';
    } else {
        document.getElementById('regModal').style.display = 'none';
    }
}
    // 1. Registration Logic: Window close hote hi ye data delete ho jayega
    function saveUser() {
    const u = document.getElementById('newU').value; // Username from popup
    const p = document.getElementById('newP').value; // Password from popup
    
    if (u && p) {
        // Save credentials temporarily (deleted when tab closes)
        sessionStorage.setItem('u', u);
        sessionStorage.setItem('p', p);

        // Auto-fill login fields
        document.getElementById('user').value = u;
        document.getElementById('pass').value = p;

        // Close popup
        document.getElementById('regModal').style.display = 'none';

        alert("Account created successfully! Please proceed to login.");
    } else {
        alert("Please enter both username and password.");
    }
}

    // 2. Login Logic: Jo register kiya hai usse match karega
    function checkLogin() {
        const uIn = document.getElementById('user').value; // Login card ka username
        const pIn = document.getElementById('pass').value; // Login card ka password
        
        const savedU = sessionStorage.getItem('u');
        const savedP = sessionStorage.getItem('p');

        if (uIn === savedU && pIn === savedP && savedU !== null) {
            window.location.href = "/quiz"; // Success hone pe quiz page
        } else {
            alert("Wrong details!");
        }
    }
</script>
</body>
</html>
