<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Performance Analytics</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #020617;
            --glass: rgba(15, 23, 42, 0.8);
            --accent-blue: #00d2ff;
            --accent-purple: #a855f7;
            --accent-green: #22c55e;
            --text-main: #f1f5f9;
        }

        body {
            margin: 0;
            padding: 40px 20px;
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
            color: var(--text-main);
            overflow-x: hidden;
        }

        .result-container {
            width: 100%;
            max-width: 1100px;
            margin: 0 auto;
        }

        /* --- KEYFRAME ANIMATIONS --- */
        @keyframes slideInLeft {
            from { opacity: 0; transform: translateX(-100px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(100px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* --- CARDS & ANIMATION ASSIGNMENTS --- */
        .card {
            background: var(--glass);
            padding: 25px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 25px;
            backdrop-filter: blur(15px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        /* Hover Animation: Scale & Color Change */
        .card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: var(--accent-blue);
            box-shadow: 0 20px 40px rgba(0, 210, 255, 0.2);
            background: rgba(30, 41, 59, 0.95);
        }

        .card::before {
            content: "";
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            transition: 0.5s;
        }

        .card:hover::before {
            left: 100%;
        }

        /* --- SCORE BANNER --- */
        .score-banner {
            text-align: center;
            padding: 50px;
            animation: popIn 0.8s ease-out;
            background: linear-gradient(145deg, rgba(15, 23, 42, 0.9), rgba(2, 6, 23, 0.9));
        }

        .final-score {
            font-family: 'Orbitron', sans-serif;
            font-size: 6rem;
            font-weight: 900;
            background: linear-gradient(to bottom, #fff, var(--accent-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px rgba(0, 210, 255, 0.5));
        }

        /* --- GRID LAYOUT --- */
        .analytics-grid {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 25px;
        }

        .grid-left { animation: slideInLeft 1s ease-out; }
        .grid-right { animation: slideInRight 1s ease-out; }

        h3 {
            font-family: 'Orbitron', sans-serif;
            color: var(--accent-blue);
            font-size: 0.8rem;
            letter-spacing: 3px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        /* --- LEADERBOARD --- */
        .entry {
            display: flex;
            justify-content: space-between;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 15px;
            margin-bottom: 10px;
            transition: 0.3s;
        }

        .user-highlight {
            border: 2px solid var(--accent-blue);
            background: rgba(0, 210, 255, 0.1) !important;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(0, 210, 255, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(0, 210, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 210, 255, 0); }
        }

        /* --- BUTTONS --- */
        .btn-area {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            animation: popIn 1.2s ease-out;
        }

        .btn {
            flex: 1;
            padding: 20px;
            border-radius: 18px;
            text-decoration: none;
            text-align: center;
            font-weight: 800;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            transition: 0.4s;
            border: none;
            cursor: pointer;
            text-transform: uppercase;
        }

        .btn-improve {
            background: transparent;
            border: 2px solid var(--accent-purple);
            color: var(--accent-purple);
        }

        .btn-improve:hover {
            background: var(--accent-purple);
            color: white;
            box-shadow: 0 0 30px rgba(168, 85, 247, 0.5);
        }

        .btn-home {
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            color: #000;
        }

        .btn-home:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.6);
        }
    </style>
</head>
<body>

    <div class="result-container">
        <div class="card score-banner">
            <p style="letter-spacing: 5px; color: var(--accent-blue); margin-bottom: 0;">ELITE ANALYSIS COMPLETE</p>
            <div class="final-score" th:text="${totalScore} + '/15'">12/15</div>
            <p id="growthMessage" style="font-weight: 300; letter-spacing: 1px;"></p>
        </div>

        <div class="analytics-grid">
            <div class="grid-left">
                <div class="card">
                    <h3>Performance Timeline</h3>
                    <canvas id="lineChart" style="max-height: 300px;"></canvas>
                </div>
            </div>

            <div class="grid-right">
                <div class="card" style="min-height: 365px;">
                    <h3>Global Leaderboard</h3>
                    <div id="leaderboard">
                        </div>
                </div>
            </div>
        </div>

        <div class="btn-area">
            <a href="/quiz" class="btn btn-improve">🚀 Improve My Marks</a>
            <a href="/" class="btn btn-home">Back to Console</a>
        </div>
    </div>

    <script th:inline="javascript">
        // 1. DATA RECOVERY
        const userScore = [[${totalScore}]];
        
        // Handle Local Storage for History
        let history = JSON.parse(localStorage.getItem('elite_history')) || [];
        history.push(userScore);
        if(history.length > 8) history.shift();
        localStorage.setItem('elite_history', JSON.stringify(history));

        // 2. LINE CHART (ANIMATED)
        const ctx = document.getElementById('lineChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: history.map((_, i) => `T-${history.length - i}`),
                datasets: [{
                    label: 'Score',
                    data: history,
                    borderColor: '#00d2ff',
                    borderWidth: 4,
                    pointRadius: 6,
                    pointHoverRadius: 10,
                    backgroundColor: 'rgba(0, 210, 255, 0.1)',
                    fill: true,
                    tension: 0.4
                }]
            },
            options: {
                responsive: true,
                animation: { duration: 2000, easing: 'easeOutQuart' },
                plugins: { legend: { display: false } },
                scales: {
                    y: { beginAtZero: true, max: 15, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#888' } },
                    x: { grid: { display: false }, ticks: { color: '#888' } }
                }
            }
        });

        // 3. SORTED LEADERBOARD LOGIC
        const scores = [
            { name: "Adi", val: 12 },
            { name: "Rahul", val: 12 },
            { name: "Ankit", val: 10 },
            { name: "Khushi", val: 9 },
            { name: "Neha", val: 6 },
            { name: "YOU", val: userScore, isMe: true }
        ];

        scores.sort((a, b) => b.val - a.val);

        const lbContainer = document.getElementById('leaderboard');
        scores.forEach((s, i) => {
            const row = document.createElement('div');
            row.className = `entry ${s.isMe ? 'user-highlight' : ''}`;
            row.style.animation = `slideInRight ${0.3 + (i * 0.1)}s ease-out`;
            row.innerHTML = `<span>${i+1}. ${s.name}</span><strong>${s.val}/15</strong>`;
            lbContainer.appendChild(row);
        });

        // 4. GROWTH TEXT LOGIC
        const growthMsg = document.getElementById('growthMessage');
        if(history.length > 1) {
            const last = history[history.length - 2];
            const diff = userScore - last;
            if(diff > 0) growthMsg.innerHTML = `<span style="color:var(--accent-green)">+${diff} Point Surge! You are evolving.</span>`;
            else if(diff < 0) growthMsg.innerHTML = `<span style="color:#ff4d4d">Drop detected. Target: Re-stabilize score.</span>`;
            else growthMsg.innerHTML = `Performance stabilized. Maintain consistency.`;
        }
    </script>
</body>
</html>
