<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Full Stack Quiz | Elite Edition</title>
    <style>
        :root {
            --bg-deep: #050a18;
            --card-bg: rgba(15, 23, 42, 0.7);
            --accent-primary: #00d2ff;
            --accent-secondary: #3a7bd5;
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
            --danger: #ff4d4d;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-deep);
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(58, 123, 213, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(0, 210, 255, 0.1) 0%, transparent 40%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        /* Initial Load Animation */
        @keyframes reveal {
            from { opacity: 0; transform: translateY(20px); filter: blur(10px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        .header-section {
            text-align: center;
            margin-bottom: 40px;
            animation: reveal 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        h1 {
            font-size: 3.5rem;
            margin: 0;
            font-weight: 800;
            background: linear-gradient(135deg, #fff 30%, var(--accent-primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        .badge {
            display: inline-block;
            padding: 6px 16px;
            background: rgba(0, 210, 255, 0.1);
            border: 1px solid rgba(0, 210, 255, 0.3);
            border-radius: 100px;
            color: var(--accent-primary);
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
        }

        /* The Premium Card */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            width: 90%;
            max-width: 850px;
            padding: 50px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            position: relative;
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            animation: reveal 1s cubic-bezier(0.16, 1, 0.3, 1) 0.2s backwards;
        }

        /* Popup Hover Effect */
        .card:hover {
            transform: scale(1.02) translateY(-10px);
            border-color: var(--accent-primary);
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.6), 0 0 20px rgba(0, 210, 255, 0.2);
        }

        /* Shimmer streak on hover */
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -150%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            transition: 0.8s;
            pointer-events: none;
        }

        .card:hover::before {
            left: 150%;
        }

        /* Info Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 40px;
            text-align: center;
        }

        .stat-box h3 {
            margin: 0;
            font-size: 0.75rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .stat-box p {
            margin: 5px 0 0;
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--accent-primary);
        }

        /* Rules Section */
        .rules-container {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .alert-bar {
            background: rgba(255, 77, 77, 0.1);
            border-left: 4px solid var(--danger);
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 25px;
            color: var(--danger);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .instruction-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .instruction-item {
            background: rgba(255, 255, 255, 0.03);
            padding: 15px 20px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.95rem;
            border: 1px solid transparent;
            transition: 0.3s;
        }

        .instruction-item:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.1);
            transform: translateX(5px);
        }

        /* Button Styling */
        .begin-btn {
            background: linear-gradient(135deg, var(--accent-secondary), var(--accent-primary));
            color: white;
            border: none;
            padding: 18px 50px;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 15px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(0, 210, 255, 0.3);
            margin-top: 10px;
            text-decoration: none;
            display: inline-block;
        }

        .begin-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 30px rgba(0, 210, 255, 0.5);
            filter: brightness(1.1);
        }

        a {
            text-decoration: none;
        }

        @media (max-width: 768px) {
            .instruction-grid { grid-template-columns: 1fr; }
            .stats-grid { grid-template-columns: 1fr; gap: 30px; }
            h1 { font-size: 2.5rem; }
            .card { padding: 30px 20px; }
        }
    </style>
</head>
<body>

    <div class="header-section">
        <span class="badge">Session Active</span>
        <h1>Full Stack Quiz</h1>
        
        <a href="/login">
            <button class="begin-btn">Begin Examination</button>
        </a>
    </div>

    <div class="card">
        <div class="stats-grid">
            <div class="stat-box">
                <h3>Total Questions</h3>
                <p>15</p> </div>
            <div class="stat-box">
                <h3>Time Limit</h3>
                <p>02 Mins</p>
            </div>
            <div class="stat-box">
                <h3>Exam Code</h3>
                <p style="color: #fff;">FS-309</p>
            </div>
        </div>

        <div class="rules-container">
            <div class="alert-bar">
                <span>⚠️</span>
                <span>Attention: Strictly adhere to all examination protocols.</span>
            </div>

            <p style="font-size: 0.8rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px;">Required Compliance</p>
            
            <div class="instruction-grid">
                <div class="instruction-item">
                    <span>No cheating allowed</span>
                    <span>❌</span>
                </div>
                <div class="instruction-item">
                    <span>Do not switch tabs</span>
                    <span>⚠️</span>
                </div>
                <div class="instruction-item">
                    <span>No screen sharing</span>
                    <span>🚫</span>
                </div>
                <div class="instruction-item">
                    <span>Attempt all questions</span>
                    <span>✔️</span>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
